  ranges:
    lower: 7.35
    upper: 7.45
  critical:
    low: 7.2
    high: 7.55
  medical_terms:
    low: Acidemia
    high: Alkalemia
    critical_low: Severe Acidemia
    critical_high: Severe Alkalemia
