# ═══════════════════════════════════════════════════════════════
# Lab Reference Ranges v3 — MIMIC-IV labevents + 외부검사 통합
# 폐 질환 진단 보조 도구용 검사실 레퍼런스
#
# v3 변경사항 (vs v2):
#   - ItemID 오류 수정: 50924 Phosphate→Ferritin, 51288 Total Protein→ESR
#   - 41개 신규 항목 추가
#   - 전 항목 disease_associations pattern 채움
#   - critical/thresholds 보충
#   - unit/loinc 누락 항목: NA 표기 + 사유 각주
#
# 카테고리 분류 (Tietz 7th / LOINC / Harrison's 21st):
#   A. Blood Gas Analysis (Tietz Ch.28)
#   B. CBC / Hematology (Tietz Ch.31)
#   C. Chemistry / Electrolytes (Tietz Ch.14-16)
#   D. Inflammatory Markers (Tietz Ch.19)
#   E. Coagulation (Tietz Ch.32)
#   F. Cardiac Markers (Tietz Ch.17)
#   G. Immunology / Autoantibodies (Tietz Ch.23)
#   H. ILD Biomarkers (ATS/ERS)
#   I. Tumor Markers (Tietz Ch.20)
#   J. Infection / Microbiology (CLSI; ATS/IDSA)
#   K. Pleural Fluid Analysis (Light NEJM 2002)
#   L. Molecular / Genetics (CAP/IASLC/AMP)
#   M. Specialty Tests (ATS/ERS)
#
# ID: 숫자=MIMIC-IV itemid, EXT_A~EXT_AG=외부검사
#
# 기준: ranges→초과/미만, thresholds→가이드라인 원문 연산자
# ═══════════════════════════════════════════════════════════════

50821:
  name: pO2 (Partial Pressure of Oxygen)
  unit: mmHg
  ref_source: Tietz 6th Ed Ch.28; Harrison's 21st Appendix
  ranges:
    lower: 80
    upper: 100
  critical:
    low: 60
    high: 500
  medical_terms:
    low: Hypoxemia
    high: Hyperoxemia
    critical_low: Severe Hypoxemia (respiratory failure threshold)
  loinc: 2703-7
  disease_associations:
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main: &id005
    - J13
    - J14
    - J15
    - J18
    pattern: ↓ (중증 시 PaO2 <60mmHg; P/F ratio로 ARDS 중복 평가)
  - disease_key: hospital_acquired_pneumonia
    disease_kr: 병원획득 폐렴 (HAP/VAP)
    icd10_main: &id008
    - J15.0
    - J15.1
    - J15.5
    - J15.6
    pattern: ↓ (기저 폐질환 동반 시 더욱 현저)
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main: &id002
    - J80
    pattern: ↓↓ (P/F ≤300=mild, ≤200=moderate, ≤100=severe; Berlin Definition)
  - disease_key: pulmonary_embolism
    disease_kr: 폐색전증
    icd10_main: &id004
    - I26.0
    - I26.09
    - I26.90
    - I26.99
    pattern: ↓ (V/Q mismatch; A-a gradient 동반 상승)
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main: &id001
    - J44.0
    - J44.1
    pattern: '↓ (만성: ≤55mmHg → LTOT 적응; 급성 악화 시 추가 저하)'
  - disease_key: asthma_exacerbation
    disease_kr: 천식 급성 악화
    icd10_main: &id003
    - J45
    - J46
    pattern: ↓ (중증 악화 시; PaO2 정상화가 피로/호흡부전 조기 징후일 수 있음)
  - disease_key: interstitial_lung_disease
    disease_kr: 간질성 폐질환 / 폐섬유화증
    icd10_main: &id006
    - J84.1
    - J84.9
    pattern: ↓ (운동 시 desaturation 초기 징후; 진행 시 안정 시에도 저하)
  - disease_key: pulmonary_edema
    disease_kr: 폐부종 / 심부전
    icd10_main: &id007
    - J81.0
    - J81.1
    - I50.1
    pattern: ↓ (폐포 부종에 의한 확산 장애)
  category: A_Blood_Gas_Analysis
  mimic_iv_itemid: 50821
50818:
  name: pCO2 (Partial Pressure of Carbon Dioxide)
  unit: mmHg
  ref_source: Tietz 6th Ed Ch.28; Harrison's 21st Appendix
  ranges:
    lower: 35
    upper: 45
  critical:
    low: 20
    high: 60
  medical_terms:
    low: Hypocapnia (respiratory alkalosis)
    high: Hypercapnia (respiratory acidosis)
    critical_high: Severe Hypercapnia (ventilatory failure)
  loinc: 2019-8
  disease_associations:
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main: *id001
    pattern: ↑ (Type 2 호흡부전; 만성 축적 시 HCO3 보상성 상승 동반)
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main: *id002
    pattern: 가변적 (초기 ↓ 과환기 → 진행 시 ↑ 환기부전)
  - disease_key: asthma_exacerbation
    disease_kr: 천식 급성 악화
    icd10_main: *id003
    pattern: 초기 ↓ (과환기) → 정상화 = 피로 징후 → ↑ = 임박 호흡부전 [GINA 2024]
  - disease_key: pulmonary_embolism
    disease_kr: 폐색전증
    icd10_main: *id004
    pattern: ↓ (과환기에 의한 호흡성 알칼리증)
  category: A_Blood_Gas_Analysis
  mimic_iv_itemid: 50818
50820:
  name: pH (Blood)
  unit: 단위 없음
  ref_source: Tietz 6th Ed Ch.28; Harrison's 21st Appendix
  ranges:
    lower: 7.35
    upper: 7.45
  critical:
    low: 7.2
    high: 7.55
  medical_terms:
    low: Acidemia
    high: Alkalemia
    critical_low: Severe Acidemia
    critical_high: Severe Alkalemia
  loinc: 2744-1
  disease_associations:
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main: *id001
    pattern: ↓ (급성 호흡성 산증 pH <7.35; 만성 보상 시 정상 근접)
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main: *id002
    pattern: '↓ (혼합 산증: 호흡성 + 젖산 대사성)'
  - disease_key: pulmonary_embolism
    disease_kr: 폐색전증
    icd10_main: *id004
    pattern: ↑ (급성 호흡성 알칼리증; 과환기 반응)
  - disease_key: asthma_exacerbation
    disease_kr: 천식 급성 악화
    icd10_main: *id003
    pattern: ↑ (초기 과환기 → 알칼리증) → ↓ (피로 시 산증 = 위험 징후) [GINA 2024]
  category: A_Blood_Gas_Analysis
  mimic_iv_itemid: 50820
50803:
  name: Bicarbonate (HCO3, calculated)
  unit: mEq/L
  ref_source: Tietz 6th Ed Ch.28
  ranges:
    lower: 22
    upper: 28
  medical_terms:
    low: Metabolic Acidosis (low HCO3)
    high: Metabolic Alkalosis (high HCO3)
  loinc: 1963-8
  category: A_Blood_Gas_Analysis
  mimic_iv_itemid: 50803
  disease_associations:
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main: *id001
    pattern: ↑ (만성 CO2 축적에 대한 신장 보상; HCO3 >28 → 만성 호흡성 산증 시사) [Harrison's 21st]
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main: *id002
    pattern: ↓ (동반 젖산 산증에 의한 대사성 산증) [Surviving Sepsis 2021]
50802:
  name: Base Excess
  unit: mEq/L
  ref_source: Tietz 6th Ed Ch.28; Harrison's 21st Appendix
  ranges:
    lower: -2
    upper: 2
  critical:
    low: -10
    high: 10
  medical_terms:
    low: Base Deficit (metabolic acidosis)
    high: Base Excess (metabolic alkalosis)
    critical_low: Severe Base Deficit (severe metabolic acidosis)
  loinc: 11555-0
  category: A_Blood_Gas_Analysis
  mimic_iv_itemid: 50802
  disease_associations:
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main: *id001
    pattern: ↑ (만성 보상; BE >2 → 만성 호흡성 산증의 대사 보상) [Tietz 7th Ch.28]
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main: *id002
    pattern: ↓ (BE <-2 → 대사성 산증; 조직 저관류/젖산 축적) [Surviving Sepsis 2021]
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main: *id005
    pattern: ↓ (패혈성 쇼크 동반 시 중증 대사성 산증)
50813:
  name: Lactate
  unit: mmol/L
  ref_source: Tietz 6th Ed Ch.14; Surviving Sepsis Campaign 2021
  ranges:
    lower: 0.5
    upper: 2.0
  critical:
    high: 4.0
  medical_terms:
    low: Normal Lactate
    high: Hyperlactatemia
    critical_high: Severe Hyperlactatemia (tissue hypoperfusion)
  loinc: 2524-7
  disease_associations:
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main:
    - J80
    pattern: ↑ (조직 저관류/저산소; >2mmol/L → 조직 저관류 시사, >4mmol/L → 패혈성 쇼크 기준) [Surviving Sepsis 2021; Berlin Definition]
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main:
    - J13
    - J14
    - J15
    - J18
    pattern: ↑ (패혈증 동반 중증 폐렴; lactate >2 → sepsis, >4 → septic shock 기준) [Surviving Sepsis 2021; qSOFA]
  - disease_key: pulmonary_embolism
    disease_kr: 폐색전증
    icd10_main:
    - I26.0
    - I26.09
    - I26.90
    - I26.99
    pattern: ↑ (대량 PE에서 심박출량 저하 → 조직 저관류) [ESC PE 2022]
  category: A_Blood_Gas_Analysis
  mimic_iv_itemid: 50813
50801:
  name: Alveolar-arterial Gradient
  unit: mmHg
  ref_source: Harrison's 21st Ch.286; Normal = age/4 + 4 (young adult <20)
  ranges:
    lower: 0
    upper: 20
  medical_terms:
    low: Normal
    high: Elevated A-a Gradient (V/Q mismatch, diffusion impairment, or shunt)
  loinc: 11556-8
  category: A_Blood_Gas_Analysis
  mimic_iv_itemid: 50801
  disease_associations:
  - disease_key: pulmonary_embolism
    disease_kr: 폐색전증
    icd10_main: *id004
    pattern: ↑ (V/Q mismatch; A-a gradient 상승 + 정상 PaCO2 → PE 의심) [Harrison's 21st Ch.273]
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main: *id005
    pattern: ↑ (폐실질 침범에 비례하여 상승)
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main: *id002
    pattern: ↑↑ (현저한 shunt → A-a gradient 매우 증가) [Berlin Definition]
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main: *id001
    pattern: ↑ (V/Q mismatch; 기저 상승 있는 경우 급성 악화 시 추가 상승)
  - disease_key: interstitial_lung_disease
    disease_kr: 간질성 폐질환 / 폐섬유화증
    icd10_main: *id006
    pattern: ↑ (확산 장애; 운동 시 더욱 증가) [ATS/ERS IPF 2022]
  thresholds:
  - name: normal_young
    criterion: <15
    source: Harrison's 21st Ch.286
  - name: age_adjusted
    criterion: Age/4 + 4
    source: Harrison's 21st Ch.286
  - name: significant_elevation
    criterion: '>30'
    source: Harrison's 21st Ch.286
    note: 유의한 가스교환 장애
50825:
  name: Temperature (Blood Gas)
  unit: °C
  ref_source: Harrison's 21st Ed Ch.17; Normal core body temperature
  ranges:
    lower: 36.1
    upper: 37.2
  critical:
    low: 35.0
    high: 40.0
  medical_terms:
    low: Hypothermia
    high: Hyperthermia (Fever)
    critical_low: Severe Hypothermia
    critical_high: Hyperpyrexia
  loinc: 8310-5
  category: A_Blood_Gas_Analysis
  mimic_iv_itemid: 50825
  disease_associations:
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main: *id005
    pattern: ↑ (발열 시 혈액가스 온도 반영; 체온 보정 필요 여부 논쟁) [Tietz 7th Ch.28]
50882:
  name: Bicarbonate (Serum CO2)
  unit: mEq/L
  ref_source: Tietz 6th Ed Ch.14
  ranges:
    lower: 22
    upper: 29
  medical_terms:
    low: Low Serum Bicarbonate (metabolic acidosis or compensated respiratory alkalosis)
    high: Elevated Serum Bicarbonate (metabolic alkalosis or compensated respiratory acidosis)
  loinc: 14627-4
  category: A_Blood_Gas_Analysis
  mimic_iv_itemid: 50882
  disease_associations:
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main: *id001
    pattern: ↑ (만성 호흡성 산증 보상; serum CO2 >29 → 만성 과탄산혈증 시사) [GOLD 2024]
  - disease_key: pulmonary_edema
    disease_kr: 폐부종 / 심부전
    icd10_main: *id007
    pattern: ↓ 또는 정상 (이뇨제 사용 시 대사성 알칼리증으로 ↑ 가능)
50954:
  name: Lactate Dehydrogenase
  unit: IU/L
  ref_source: Tietz 6th Ed Ch.16; Harrison's 21st Appendix
  ranges:
    lower: 100
    upper: 250
  medical_terms:
    low: Normal
    high: Elevated LDH (tissue damage/hemolysis)
  loinc: 2532-0
  disease_associations:
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main: *id005
    pattern: ↑ (폐 조직 손상 반영; 중증 폐렴에서 상승) [Harrison's 21st]
  - disease_key: tuberculosis
    disease_kr: 폐결핵
    icd10_main: &id012
    - A15.0
    - A15.3
    - A15.9
    pattern: ↑ (활동성 결핵에서 상승; 치료 반응 모니터링 가능) [Harrison's 21st Ch.173]
  - disease_key: lung_cancer
    disease_kr: 폐암
    icd10_main: &id013
    - C34.0
    - C34.1
    - C34.9
    pattern: ↑ (특히 SCLC에서 현저; 종양 부하/예후 반영) [NCCN 2024]
  - disease_key: interstitial_lung_disease
    disease_kr: 간질성 폐질환 / 폐섬유화증
    icd10_main: *id006
    pattern: ↑ (폐포 상피 손상 반영; ILD 활성도 보조 지표) [ATS/ERS IPF 2022]
  - disease_key: pleural_effusion
    disease_kr: 흉수
    icd10_main: &id016
    - J90
    - J91.0
    - J91.8
    pattern: '↑ (Light Criteria 구성: 흉수 LDH >200 또는 흉수/혈청 비 >0.6 → 삼출) [Light, NEJM 2002]'
  - disease_key: lung_abscess
    disease_kr: 폐농양
    icd10_main: &id009
    - J85.1
    - J85.2
    pattern: ↑ (조직 괴사/파괴 반영)
  - disease_key: viral_pneumonia
    disease_kr: 바이러스 폐렴
    icd10_main: &id010
    - J12
    - J12.9
    pattern: ↑ (COVID-19 중증도 지표; PCP에서도 현저한 상승) [Lancet Respir Med 2020]
  category: A_Blood_Gas_Analysis
  mimic_iv_itemid: 50954
  critical:
    high: 500
50826:
  name: Tidal Volume (Blood Gas)
  unit: mL
  ref_source: Harrison's 21st Ch.286; Normal 6-8 mL/kg IBW
  ranges:
    lower: 300
    upper: 700
  medical_terms:
    low: Low Tidal Volume
    high: Elevated Tidal Volume
  loinc: NA
  category: A_Blood_Gas_Analysis
  mimic_iv_itemid: 50826
  note: 'LOINC 코드 미할당: 혈액가스 분석기에서 보조적으로 기록하는 환기 파라미터로, 표준 lab LOINC 체계에 독립 코드 없음. 인공호흡기 chartevents의 Vt(224684/224685)가 주
    기록원.'
  disease_associations:
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main: *id002
    pattern: 'ARDSNet 폐보호 환기: ≤6 mL/kg IBW 목표 [NEJM 2000]'
51301:
  name: White Blood Cell Count
  unit: K/uL
  ref_source: Tietz 6th Ed Ch.31; Harrison's 21st Appendix
  ranges:
    lower: 4.5
    upper: 11.0
  critical:
    low: 2.0
    high: 30.0
  medical_terms:
    low: Leukopenia
    high: Leukocytosis
    critical_low: Severe Leukopenia (infection risk)
    critical_high: Marked Leukocytosis (leukemoid reaction)
  loinc: 6690-2
  disease_associations: &id011
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main: *id005
    pattern: '↑ (>12,000: 세균 감염 시사; 좌방이동 동반 → 급성 세균 감염) [ATS/IDSA 2019]'
  - disease_key: hospital_acquired_pneumonia
    disease_kr: 병원획득 폐렴 (HAP/VAP)
    icd10_main: *id008
    pattern: ↑ (HAP/VAP에서 새로운 WBC 상승 → 감염 트리거) [ATS/IDSA 2016]
  - disease_key: lung_abscess
    disease_kr: 폐농양
    icd10_main: *id009
    pattern: ↑ (현저한 백혈구 증가; >20,000 가능) [Harrison's 21st]
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main: *id001
    pattern: ↑ (세균 감염 동반 악화 시; 바이러스 악화 시 정상/↓) [GOLD 2024]
  - disease_key: bronchiectasis
    disease_kr: 기관지확장증
    icd10_main: &id017
    - J47.0
    - J47.1
    - J47.9
    pattern: ↑ (감염 악화 시) [ERS Bronchiectasis 2017]
  - disease_key: viral_pneumonia
    disease_kr: 바이러스 폐렴
    icd10_main: *id010
    pattern: 정상 또는 ↓ (림프구 감소 동반; COVID-19에서 WBC 정상이나 lymphopenia 특징) [Lancet 2020]
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main: *id002
    pattern: ↑ (감염성 원인 시) 또는 ↓ (패혈증 진행 시 → 불량 예후)
  - disease_key: empyema
    disease_kr: 농흉
    icd10_main: &id015
    - J86
    pattern: ↑↑ (현저한 백혈구 증가 + 좌방이동)
  category: B_CBC_Hematology
  mimic_iv_itemid: 51301
51300:
  name: White Blood Cell Count
  unit: K/uL
