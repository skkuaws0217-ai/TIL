    - J12
    - J12.9
    pattern: COVID-19 감별진단의 핵심; 다른 호흡기 바이러스(인플루엔자, RSV)와 multiplex PCR로 동시 감별 [CDC 2020]
53186:
  name: Rapid SARS-CoV-2 PCR (COVID-19 Rapid PCR)
  unit: Detected/Not detected
  category: J_Infection_Microbiology
  ref_source: FDA EUA; Cepheid Xpert Xpress; Abbott ID NOW; WHO 2021
  mimic_iv_itemid: 53186
  interpretation: 'Not detected = 음성. Detected = SARS-CoV-2 양성. 신속 NAAT (결과 15분-1시간). Point-of-care 사용 가능. Standard RT-PCR
    대비 sensitivity 다소 낮을 수 있음 (Abbott ID NOW: ~93-95%)'
  medical_terms:
    high: Detected (SARS-CoV-2 양성)
  loinc: 95409-9
  disease_associations:
  - disease_key: covid_19
    disease_kr: COVID-19 (SARS-CoV-2 감염)
    icd10_main: *id024
    pattern: Detected → COVID-19 양성; 응급 상황에서 신속 진단; 음성이나 임상적 의심 높으면 standard RT-PCR 재검 권고 [FDA EUA; WHO 2021]
51560:
  name: Anti-SARS-CoV-2 IgA Antibody
  unit: Index (S/CO ratio)
  category: G_Immunology_Autoantibodies
  ref_source: WHO COVID-19 Serology 2020; Deeks et al. Cochrane 2020
  mimic_iv_itemid: 51560
  ranges:
    lower: 0
  thresholds:
  - name: positive
    criterion: ≥1.0 (S/CO)
    source: Assay-dependent (Euroimmun 등)
    note: 양성 판정 기준은 제조사별 상이
  interpretation: 음성 (<1.0) = 항체 미검출. 양성 (≥1.0) = SARS-CoV-2 감염 후 또는 백신 접종 후 면역 반응. IgA는 점막 면역 반영; IgG보다 조기 출현 (증상 후 ~5-7일).
    급성 진단 목적으로는 부적합 (seroconversion에 시간 필요)
  medical_terms:
    high: Anti-SARS-CoV-2 IgA Positive (과거 감염 또는 백신 면역 반응)
  loinc: 96118-5
  note: 혈청학적 검사는 급성 진단이 아닌 역학조사/면역 상태 확인 목적. IgM(초기)/IgG(후기)/IgA(점막)는 각각 출현 시점과 지속 기간이 다름. 백신 접종자에서도 양성 → 감염 vs 백신 구별에 nucleocapsid(N)
    vs spike(S) 항체 구분 필요 [Deeks et al. Cochrane 2020].
  disease_associations:
  - disease_key: covid_19
    disease_kr: COVID-19 (SARS-CoV-2 감염)
    icd10_main: *id024
    pattern: 양성 → 과거 SARS-CoV-2 감염 또는 백신 면역; 급성 진단에는 RT-PCR 우선; seroconversion 확인(급성기+회복기 쌍혈청)으로 후향적 진단 가능 [WHO 2020; Deeks,
      Cochrane 2020]
EXT_AH:
  name: SARS-CoV-2 Rapid Antigen Test
  unit: Positive/Negative
  category: J_Infection_Microbiology
  mimic_iv_available: false
  ref_source: WHO Interim Guidance on Ag-RDTs 2021; Dinnes et al. Cochrane 2021
  interpretation: 'Negative = 항원 미검출. Positive = SARS-CoV-2 항원 검출. Sensitivity: 증상 첫 주 ~80-90%, 무증상 ~50-70%. Specificity >99%.
    위음성 가능 → 임상 의심 시 RT-PCR 확인 필요'
  medical_terms:
    high: Positive (SARS-CoV-2 항원 검출)
  loinc: 97099-6
  note: Point-of-care 신속 진단 (15-30분). 바이러스 부하 높은 시기(증상 발현 전후)에 sensitivity 최고. Omicron 변이에서 일부 키트 sensitivity 저하 보고. WHO는
    RT-PCR 접근 어려운 상황 또는 선별검사에 권고 [WHO 2021; Dinnes et al. Cochrane 2021].
  disease_associations:
  - disease_key: covid_19
    disease_kr: COVID-19 (SARS-CoV-2 감염)
    icd10_main: *id024
    pattern: Positive → COVID-19 추정 진단; 증상 첫 5-7일 내 sensitivity 최고 (~80-90%); 음성이라도 임상적 의심 시 RT-PCR 확인 [WHO Ag-RDT Guidance
      2021; Dinnes, Cochrane 2021]
EXT_AI:
  name: SARS-CoV-2 IgG/IgM Antibody
  unit: Positive/Negative or Index
  category: G_Immunology_Autoantibodies
  mimic_iv_available: false
  ref_source: WHO COVID-19 Serology 2020; Deeks et al. Cochrane 2020; Guo et al. Clin Infect Dis 2020
  interpretation: 'IgM: 증상 후 ~3-7일 출현, 2-3주 peak, 이후 감소. IgG: 증상 후 ~10-14일 출현, 수개월 지속. 급성 진단에 부적합 (window period). 과거 감염 확인/역학조사에
    사용. Anti-N(nucleocapsid) → 자연감염, Anti-S(spike) → 감염 또는 백신'
  medical_terms:
    high: Positive (SARS-CoV-2 면역 반응 — 과거 감염 또는 백신)
  loinc: 94762-2
  note: 'Sensitivity: 증상 후 1주 <30%, 2주 ~70%, 3주 >90% [Deeks, Cochrane 2020]. 교차반응: 다른 코로나바이러스(HCoV-OC43 등)와 가능. 백신 접종 보편화로
    해석 복잡 → Anti-N vs Anti-S 구분 필수.'
  disease_associations:
  - disease_key: covid_19_infection
    disease_kr: COVID-19 감염 (SARS-CoV-2 감염)
    icd10_main: *id024
    pattern: 양성(IgG) → 과거 감염 또는 백신; 쌍혈청(acute + convalescent)에서 IgG 4배 이상 상승 → 후향적 진단 가능; seroprevalence 조사에 핵심 [WHO 2020;
      Guo et al. CID 2020]
EXT_AJ:
  name: NLR (Neutrophil-to-Lymphocyte Ratio)
  unit: Ratio (계산값)
  category: B_CBC_Hematology
  mimic_iv_available: 계산값 — 51256 Neutrophils(%) / 51244 Lymphocytes(%)로 산출
  ref_source: Liu et al. J Transl Med 2020 (COVID-19); Cedrés et al. Lung Cancer 2012 (NSCLC); Forget et al. BMC Res Notes
    2017 (정상 범위)
  ranges:
    lower: 1.0
    upper: 3.0
  thresholds:
  - name: covid_severe
    criterion: ≥3.13
    source: Liu et al. J Transl Med 2020
    note: COVID-19 중증 진행 예측 (sensitivity 87.5%)
  - name: covid_critical
    criterion: ≥5.0
    source: Yang et al. Int J Infect Dis 2020
    note: COVID-19 ICU 입원/사망 위험 증가
  - name: nsclc_poor_prognosis
    criterion: ≥5.0
    source: Cedrés et al. Lung Cancer 2012
    note: NSCLC 불량 예후 cut-off
  - name: sepsis_indicator
    criterion: ≥10
    source: Zahorec R. Bratisl Lek Listy 2001
    note: 중증 패혈증/패혈성 쇼크 시사
  medical_terms:
    low: Normal (정상 면역 균형)
    high: Elevated NLR (전신 염증/면역 억제/불량 예후 지표)
    critical_high: Markedly Elevated NLR ≥10 (중증 패혈증/전신 염증)
  loinc: 770-8 / 736-9 (구성요소)
  note: NLR = Absolute Neutrophil Count / Absolute Lymphocyte Count (또는 %비율). 단순하지만 강력한 예후 인자. COVID-19, NSCLC, 패혈증 등에서 독립적
    예후 예측력 입증. MIMIC-IV에서 CBC differential로부터 산출 가능.
  disease_associations:
  - disease_key: covid_19
    disease_kr: COVID-19 (SARS-CoV-2 감염)
    icd10_main: *id024
    pattern: ↑ (NLR ≥3.13 → 중증 진행 예측 sensitivity 87.5%; ≥5 → ICU/사망 위험 증가; 입원 시 NLR은 독립적 예후 인자) [Liu et al. J Transl Med 2020;
      Yang et al. Int J Infect Dis 2020]
  - disease_key: lung_cancer
    disease_kr: 폐암
    icd10_main:
    - C34.0
    - C34.1
    - C34.9
    pattern: ↑ (NLR ≥5 → NSCLC 불량 예후; 전체 생존/무진행 생존과 역상관; 면역항암제 반응 예측 보조) [Cedrés et al. Lung Cancer 2012; Mezquita et al.
      JAMA Oncol 2018]
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main:
    - J13
    - J14
    - J15
    - J18
    pattern: ↑ (중증 폐렴에서 상승; 패혈증 동반 시 NLR ≥10) [de Jager et al. Crit Care 2010]
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main:
    - J80
    pattern: ↑ (전신 염증 반영; 높을수록 사망률 증가)
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main:
    - J44.0
    - J44.1
    pattern: ↑ (급성 악화 시 상승; 안정기 NLR 상승은 빈번한 악화 예측) [Lee et al. Int J COPD 2016]
