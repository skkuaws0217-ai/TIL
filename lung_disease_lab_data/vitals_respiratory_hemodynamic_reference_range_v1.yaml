    - I26.0
    - I26.09
    - I26.90
    - I26.99
    pattern: ↑ (우심 부전 / RV 후부하 증가)
  - disease_key: pulmonary_hypertension
    disease_kr: 폐동맥 고혈압
    icd10_main:
    - I27.0
    - I27.20
    - I27.21
    - I27.29
    pattern: ↑ (만성 우심 부전)
  - disease_key: pneumothorax
    disease_kr: 기흉
    icd10_main:
    - J93.0
    - J93.1
    - J93.9
    pattern: ↑ (긴장성 기흉 → 정맥 환류 차단)
  - disease_key: pulmonary_edema
    disease_kr: 폐부종 / 심부전
    icd10_main:
    - J81.0
    - J81.1
    - I50.1
    pattern: ↑ (용적 과부하; 이뇨 치료 모니터링)
  - disease_key: acute_respiratory_failure
    disease_kr: 급성 호흡부전
    icd10_main: *id005
    pattern: '가변적 (패혈증: 초기 ↓ → 수액 후 ↑; ARDS + 양압환기: ↑)'
  - disease_key: lung_cancer
