223987:
  name: RLL Lung Sounds
  name_kr: 우하엽 폐음
  unit: text
  category: Pulmonary
  ref_source: Bohadana et al. NEJM 2014;370:744-751; Bates' 13th Ed (Bickley 2021); Harrison's 21st Ch.284
  type: categorical
  values:
  - Clear
  - Diminished
  - Absent
  - Crackles
  - Rhonchi
  - Wheezes
  - Bronchial
  clinical_significance:
    Clear: 정상 vesicular 호흡음
    Diminished: 폐음 감소 — 우측 흉수(가장 흔한 원인), 우측 기흉, 우하엽 무기폐, 비만, COPD 과팽창 [Bates' 13th]
    Absent: 폐음 소실 — 대량 우측 기흉, 대량 우측 흉수, 완전 우하엽 무기폐 [Harrison's 21st]
    Crackles: '수포음 — (1) Fine: IPF/ILD 양측 기저부 velcro crackles, 초기 폐부종 [NEJM 2014]; (2) Coarse: 흡인성 폐렴(RLL이 해부학적으로 가장 호발),
      세균성 폐렴, 기관지확장증 [Harrison''s 21st]'
    Rhonchi: 저음 연속음 — 기도 분비물(COPD 악화, 기관지확장증); 기침 후 소실 또는 변화 [NEJM 2014; ERS 2000]
    Wheezes: 고음 연속음 — 천식, COPD 악화; RLL 국소 wheezes 시 기관지 내 종양/이물 감별 필요 [Forgacs, Chest 1978]
    Bronchial: 기관지성 호흡음 — 폐 말초에서 청취 시 consolidation(대엽성 폐렴), 무기폐 인접 부위 [NEJM 2014]
  note: RLL은 흡인성 폐렴��� 가장 호발 부위 — 우주기관지가 좌측보다 넓고(평균 16mm vs 13mm), 짧고(2.5cm vs 5cm), 수직 각도가 가파름(25° vs 45°)으로 흡인물이 중력에 의해
    우선 유입 [Harrison's 21st Ch.257; Murray & Nadel 7th Ch.36]. 또한 자유 흉수는 중력 의존적으로 하엽에 저류하며, 간 때문에 우측 횡격막이 높아 우측 흉수가 좌측보다 임상적으로
    더 흔하게 감지됨 [Bates' 13th].
  disease_associations:
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main: *id018
    pattern: Crackles, Bronchial (대엽성 consolidation; RLL은 CAP에서 가장 흔한 침범 엽 중 하나) [Harrison's 21st]
  - disease_key: hospital_acquired_pneumonia
    disease_kr: 병원획득 폐렴 (HAP/VAP)
    icd10_main: &id037
    - J15.0
    - J15.1
    - J15.5
    - J15.6
    - J95.851
    pattern: Crackles, Bronchial (HAP/VAP에서 하엽 침범 흔���) [ATS/IDSA 2016]
  - disease_key: aspiration_pneumonia
    disease_kr: 흡인성 폐렴
    icd10_main: *id019
    pattern: Crackles (RLL이 해부학적으로 가장 흔한 흡인 부위; 앙와위 흡인 시 후분절 우세) [Harrison's 21st Ch.257]
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main: *id020
    pattern: Wheezes, Rhonchi, Diminished (전반적이나 하엽에서 더 뚜렷할 수 있음) [GOLD 2024]
  - disease_key: asthma_exacerbation
    disease_kr: 천식 급성 악화
    icd10_main: *id021
    pattern: Wheezes (양측 미만성 호기 wheezes; silent chest = 생명위협) [GINA 2024]
  - disease_key: pulmonary_embolism
    disease_kr: 폐색전증
    icd10_main: &id039
    - I26.0
    - I26.09
    - I26.90
    - I26.99
    pattern: Diminished (폐경색 시 국소), Pleural rub (경색 인접 흉막 마찰음) [ESC PE 2022]
  - disease_key: pulmonary_edema
    disease_kr: 폐부종 / 심부전
    icd10_main: *id022
    pattern: Fine Crackles (양측 하부 대칭, 중력 의존적; 하엽에서 가장 먼저 출현) [NEJM 2014; Harrison's 21st]
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main: &id038
    - J80
    pattern: Crackles (양측 미만성; 하엽 우세 시작 → 전엽 확산) [Berlin Definition; Harrison's 21st]
  - disease_key: pleural_effusion
    disease_kr: 흉수
    icd10_main: *id023
    pattern: Diminished/Absent (우측 흉수 시 RLL에서 가장 먼저 감소; 흉수-폐 경계에서 bronchial/egophony) [Bates' 13th]
  - disease_key: pneumothorax
    disease_kr: 기흉
    icd10_main: *id024
    pattern: Diminished/Absent (우측 기흉 시; 긴장성이면 기관 좌측 편위 동반) [Harrison's 21st]
  - disease_key: interstitial_lung_disease
    disease_kr: 간질성 폐질환 / 폐섬유화증
    icd10_main: *id025
    pattern: Fine Crackles (양측 기저부 velcro-type; IPF, 석면폐증에서 하엽 우세 — 'bilateral basal crackles') [ATS/ERS IPF 2022; Murray
      & Nadel 7th]
  - disease_key: lung_abscess
    disease_kr: 폐농양
    icd10_main: &id041
    - J85.1
    - J85.2
    pattern: Crackles (하엽 후분절 호발; 흡인 기전과 동일한 해부학적 이유), Bronchial (공동 인접) [Harrison's 21st]
  - disease_key: bronchiectasis
    disease_kr: 기관지확장증
    icd10_main: *id026
    pattern: Coarse Crackles (지속적; 체위 배액/기침 후 변화), Rhonchi (분비물 축적) [ERS Bronchiectasis 2017]
  - disease_key: lung_cancer
    disease_kr: 폐암
    icd10_main: *id027
    pattern: Diminished (폐쇄 후 무기폐 시), 국소 Wheezes (기관지 내 종양; 흡기 wheezes는 고정 폐쇄 시사) [Harrison's 21st Ch.74]
  - disease_key: tuberculosis
    disease_kr: 폐결핵
    icd10_main: &id036
    - A15.0
    - A15.3
    - A15.5
    - A15.6
    - A15.9
    pattern: Crackles (활동성 감염 시; RLL은 결핵에서 비전형 부위이나 면역저하/당뇨 환자에서 하엽 침범 가능) [Harrison's 21st Ch.173]
  - disease_key: empyema
    disease_kr: 농흉
    icd10_main: *id028
    pattern: Diminished/Absent (감염성 흉수; 우측에서 더 흔), Bronchial (흉수 상부 경계) [BTS Pleural Disease 2023]
  - disease_key: atelectasis
    disease_kr: 무기폐 (폐허탈)
    icd10_main: *id029
    pattern: Diminished/Absent (RLL 무기폐 — 수술 후 가장 흔한 부위), Bronchial (인접 허파 조직) [Harrison's 21st]
  - disease_key: viral_pneumonia
    disease_kr: 바이러스 폐렴
    icd10_main: *id030
    pattern: Crackles (양측 하부 우세; COVID-19에서 RLL 초기 침범 빈도 높음) [Lancet Respir Med 2020]
  - disease_key: emphysema
