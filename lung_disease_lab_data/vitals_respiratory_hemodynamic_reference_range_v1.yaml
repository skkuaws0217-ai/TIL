223762:
  name: Temperature Celsius
  name_kr: 체온 (섭씨)
  unit: °C
  category: Routine Vital Signs
  ref_source: Harrison's 21st Ch.17; NEWS2 (RCP 2017); O'Grady et al. Clin Infect Dis 2008
  ranges:
    lower: 36.1
    upper: 37.2
  thresholds:
  - name: fever
    criterion: ≥38.0
    source: O'Grady et al. Clin Infect Dis 2008; Harrison's 21st
    note: 발열 정의
  - name: high_fever
    criterion: ≥39.0
    source: Harrison's 21st Ch.17
    note: 고열
  - name: hyperpyrexia
    criterion: ≥40.0
    source: Harrison's 21st Ch.17
    note: 과고열 — 중추신경 손상 위험
  - name: hypothermia
    criterion: <36.0
    source: NEWS2 (RCP 2017)
    note: 저체온
  - name: severe_hypothermia
    criterion: ≤35.0
    source: NEWS2 (RCP 2017); Surviving Sepsis 2021
    note: 중증 저체온 — 패혈증 시 불량 예후
  medical_terms:
    low: Hypothermia
    high: Fever (Pyrexia)
    critical_low: Severe Hypothermia (poor prognosis in sepsis)
    critical_high: Hyperpyrexia
  scoring_systems:
    NEWS2:
      ≤35.0: 3
      35.1–36.0: 1
      36.1–38.0: 0
      38.1–39.0: 1
      ≥39.1: 2
  disease_associations:
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main:
    - J13
    - J14
    - J15
    - J18
    pattern: ↑ (≥38°C; 노인/면역저하에서 정상일 수 있음)
  - disease_key: hospital_acquired_pneumonia
    disease_kr: 병원획득 폐렴 (HAP/VAP)
    icd10_main:
    - J15.0
    - J15.1
    - J15.5
    - J15.6
    pattern: ↑ (새로운 발열 → HAP/VAP 의심 트리거)
  - disease_key: tuberculosis
    disease_kr: 폐결핵
    icd10_main:
    - A15.0
    - A15.3
    - A15.9
    pattern: ↑ (미열, 오후/야간 발열 패턴)
  - disease_key: lung_abscess
    disease_kr: 폐농양
    icd10_main:
    - J85.1
    - J85.2
    pattern: ↑ (지속성 발열 + 화농성 객담)
  - disease_key: pulmonary_embolism
    disease_kr: 폐색전증
    icd10_main:
    - I26.0
    - I26.09
    - I26.90
    - I26.99
    pattern: ↑ (경미한 발열 가능; 감별진단 혼란 요소)
  - disease_key: aspiration_pneumonia
    disease_kr: 흡인성 폐렴
    icd10_main: *id001
    pattern: ↑ (흡인 24-48시간 후 발열; 화학적 폐렴은 초기 무열 가능)
  - disease_key: lung_cancer
    disease_kr: 폐암
    icd10_main: *id002
    pattern: 정상~경미 ↑ (폐쇄 후 폐렴 동반 시 발열; 종양 자체 열 가능)
  - disease_key: sarcoidosis
    disease_kr: 사르코이드증
    icd10_main: *id003
    pattern: 경미 ↑ (미열; 급성형에서 Löfgren 증후군 시 발열)
  - disease_key: bronchiectasis
    disease_kr: 기관지확장증
    icd10_main: *id004
    pattern: ↑ (감염 악화 시; 만성 colonization에서도 간헐적 발열)
  - disease_key: acute_respiratory_failure
    disease_kr: 급성 호흡부전
    icd10_main: *id005
    pattern: 가변적 (원인 질환에 따라; 감염성이면 ↑, 비감염성이면 정상)
  - disease_key: viral_pneumonia
    disease_kr: 바이러스 폐렴
    icd10_main: *id007
    pattern: '↑ (COVID-19: ≥37.3–38°C; 인플루엔자보다 경미할 수 있음)'
  - disease_key: influenza_pneumonia
    disease_kr: 인플루엔자
    icd10_main: *id008
    pattern: ↑↑ (급격한 고열 ≥39°C 특징적; 3-5일 지속)
  - disease_key: empyema
    disease_kr: 농흉
    icd10_main: *id009
    pattern: ↑↑ (지속성 고열; 항생제 불응 발열의 흔한 원인)
  - disease_key: hypersensitivity_pneumonitis
    disease_kr: 과민성 폐렴
    icd10_main: *id012
    pattern: '↑ (급성형: 노출 4-8시간 후 발열+오한; 만성형은 무열)'
  - disease_key: pulmonary_eosinophilia
    disease_kr: 폐 호산구증가증
    icd10_main: *id014
    pattern: 경미 ↑ (기생충 관련 시 발열 동반)
  - disease_key: acute_bronchitis
    disease_kr: 급성 기관지염
    icd10_main: *id016
    pattern: 정상~경미 ↑ (≥38°C 드묾; 고열이면 폐렴 감별 필요)
  - disease_key: acute_bronchiolitis
    disease_kr: 급성 세기관지염
    icd10_main: *id017
    pattern: 경미 ↑ (저등도 발열 흔함; 고열이면 세균 중복감염 의심)
  note: 패혈증에서 저체온(<36°C)은 발열보다 불량한 예후 시사
  related_itemids:
  - 223761
223761:
  name: Temperature Fahrenheit
  name_kr: 체온 (화씨)
  unit: °F
  category: Routine Vital Signs
  ref_source: Harrison's 21st Ch.17
  ranges:
    lower: 97.0
    upper: 99.0
  thresholds:
  - name: fever
    criterion: ≥100.4
    source: Harrison's 21st Ch.17
    note: 발열 정의 (=38.0°C)
  - name: hypothermia
    criterion: <96.8
    source: Harrison's 21st Ch.17
    note: 저체온 (=36.0°C)
  medical_terms:
    low: Hypothermia
    high: Fever (Pyrexia)
  note: '°F → °C 변환: (°F - 32) × 5/9'
228640:
  name: EtCO2 (End-Tidal CO2)
  name_kr: 호기말 이산화탄소
  unit: mmHg
  category: Routine Vital Signs
  ref_source: AHA ACLS 2020; Gravenstein, Capnography 2nd Ed
  ranges:
    lower: 35
    upper: 45
  thresholds:
  - name: hypocapnia
    criterion: <30
    source: Harrison's 21st Ch.286
    note: 과환기 or 심박출량 저하 or PE
  - name: hypercapnia
    criterion: '>50'
    source: Harrison's 21st Ch.286
    note: 저환기 or COPD or 기도 폐쇄
  - name: cardiac_arrest_poor_prognosis
    criterion: <10
    source: AHA ACLS 2020
    note: 심정지 중 EtCO2 <10 → 불량 예후
  medical_terms:
    low: Low EtCO2 (hyperventilation, low cardiac output, PE)
    high: High EtCO2 (hypoventilation, COPD, airway obstruction)
    critical_low: Very Low EtCO2 (cardiac arrest, massive PE)
  disease_associations:
  - disease_key: pulmonary_embolism
    disease_kr: 폐색전증
    icd10_main:
    - I26.0
    - I26.09
    - I26.90
    - I26.99
    pattern: ↓ (사강 환기 증가 → EtCO2 급격 저하; PaCO2-EtCO2 gap 증가)
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main:
    - J44.0
    - J44.1
    pattern: ↑ (CO2 축적; 만성 과탄산혈증 모니터링)
  - disease_key: asthma_exacerbation
    disease_kr: 천식 급성 악화
    icd10_main:
    - J45
    - J46
    pattern: 초기 ↓ (과환기) → 정상화 → ↑ (피로/기도폐쇄 악화 = 위험 징후)
  - disease_key: acute_respiratory_failure
    disease_kr: 급성 호흡부전
    icd10_main: *id005
    pattern: 'Type 2: ↑ (CO2 축적; >50mmHg); Type 1: ↓ or 정상'
  - disease_key: chronic_respiratory_failure
    disease_kr: 만성 호흡부전
    icd10_main: *id006
    pattern: ↑ (만성 CO2 축적; 기저 EtCO2 높음)
  - disease_key: emphysema
    disease_kr: 폐기종
    icd10_main: *id011
    pattern: ↑ (air trapping에 의한 CO2 저류)
  - disease_key: sleep_apnea
    disease_kr: 수면무호흡
    icd10_main: *id015
    pattern: ↑ (OHS 동반 시 주간 과탄산혈증; OSA 단독은 정상)
  note: 비침습적 CO2 모니터링. 인공호흡기 환자의 환기 적절성 실시간 평가
223835:
  name: Inspired O2 Fraction (FiO2)
  name_kr: 흡입 산소 농도
  unit: fraction (0.21–1.0)
  category: Respiratory
  ref_source: Berlin Definition 2012; ARDSNet Protocol (NEJM 2000); BTS Oxygen Guideline 2017
  ranges:
    lower: 0.21
    upper: 1.0
  thresholds:
  - name: room_air
    criterion: =0.21
    source: 기본 대기 산소 농도
    note: 보충 산소 없음
  - name: oxygen_toxicity_risk
    criterion: '>0.60'
    source: BTS Oxygen Guideline 2017
    note: 장기간(>24h) 노출 시 산소 독성 우려
  medical_terms:
    high: High FiO2 requirement (severe gas exchange impairment)
  disease_associations:
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main:
    - J80
    pattern: ↑↑ (FiO2 >0.6 장기 사용 → 산소 독성)
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main:
    - J13
    - J14
    - J15
    - J18
    pattern: ↑ (중증 폐렴에서 높은 FiO2 요구)
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main:
    - J44.0
    - J44.1
    pattern: '주의: 과도한 FiO2 → CO2 narcosis 위험 (목표 SpO2 88–92%)'
  - disease_key: aspiration_pneumonia
    disease_kr: 흡인성 폐렴
    icd10_main: *id001
    pattern: ↑ (대량 흡인 시 높은 FiO2 요구; ARDS 진행 시 ≥0.6)
  - disease_key: acute_respiratory_failure
    disease_kr: 급성 호흡부전
    icd10_main: *id005
    pattern: ↑↑ (산소화 유지를 위한 FiO2 증량이 핵심 치료)
  - disease_key: viral_pneumonia
    disease_kr: 바이러스 폐렴
    icd10_main: *id007
    pattern: ↑ (양측 GGO → 높은 FiO2; HFNC 60L + FiO2 1.0까지 가능)
  - disease_key: empyema
    disease_kr: 농흉
    icd10_main: *id009
    pattern: ↑ (흉수 + 감염에 의한 가스교환 장애)
  - disease_key: atelectasis
    disease_kr: 무기폐 (폐허탈)
    icd10_main: *id010
    pattern: ↑ (재팽창 전까지 FiO2 증량; 100% O2는 흡수 무기폐 악화 우려)
  derived_indicators:
  - name: PaO2/FiO2 ratio (P/F ratio)
    description: ARDS Berlin Definition 중증도 분류
    source: ARDS Definition Task Force. JAMA 2012
    formula: PaO2 (mmHg) / FiO2 (with PEEP ≥5 cmH2O)
    thresholds:
      mild: ≤300 and >200
      moderate: ≤200 and >100
      severe: ≤100
  - name: SpO2/FiO2 ratio (S/F ratio)
    description: 비침습적 ARDS 중증도 대체 지표
    source: Rice et al. Crit Care Med 2007
    formula: SpO2 / FiO2
    thresholds:
      mild: ≤315
      moderate: ≤235
      severe: ≤148
  related_itemids:
  - 226754
  - 227010
220339:
  name: PEEP set
  name_kr: 호기말 양압 (설정값)
  unit: cmH2O
  category: Respiratory
  ref_source: Berlin Definition 2012; ARDSNet Protocol (NEJM 2000)
  ranges:
    lower: 0
    upper: 24
  thresholds:
  - name: ards_diagnostic_minimum
    criterion: ≥5
    source: ARDS Definition Task Force. JAMA 2012 (Berlin)
    note: ARDS 진단 필수 조건
  - name: moderate_ards_typical
    criterion: ≥10
    source: ARDSNet Low PEEP/FiO2 Table
    note: 중등도 ARDS에서 일반적 설정
  - name: high_peep
    criterion: ≥15
    source: ARDSNet High PEEP/FiO2 Table
    note: 중증 ARDS — 높은 recruitability 시 고려
  medical_terms:
    high: High PEEP (severe gas exchange impairment, recruitable lung)
  disease_associations:
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main:
    - J80
    pattern: ↑ (Berlin Definition에서 ≥5 필수; ARDSNet PEEP table 적용)
  - disease_key: pulmonary_edema
    disease_kr: 폐부종 / 심부전
    icd10_main:
    - J81.0
    - J81.1
    - I50.1
    pattern: ↑ (양압으로 폐부종 감소 + 전부하 감소 효과)
  - disease_key: aspiration_pneumonia
    disease_kr: 흡인성 폐렴
    icd10_main: *id001
    pattern: ↑ (ARDS 진행 시 Berlin Definition에 따라 ≥5 적용)
  - disease_key: acute_respiratory_failure
    disease_kr: 급성 호흡부전
    icd10_main: *id005
    pattern: ↑ (폐 recruitment; ARDS 동반 시 ARDSNet table 적용)
  - disease_key: viral_pneumonia
    disease_kr: 바이러스 폐렴
    icd10_main: *id007
    pattern: '↑ (COVID-19 ARDS: 높은 PEEP에 반응 좋은 경우 많음)'
  - disease_key: atelectasis
    disease_kr: 무기폐 (폐허탈)
    icd10_main: *id010
    pattern: ↑ (폐 재팽창 촉진; 수술 후 예방적 CPAP/PEEP 적용)
  derived_indicators:
  - name: Ventilator dependence
    description: 기계환기 여부 판별
    formula: PEEP > 0 or FiO2 > 0.21
    interpretation: true → 기계환기 중
  related_itemids:
  - 224700
  - 224699
224700:
  name: Total PEEP Level
  name_kr: 총 PEEP (설정 + 자동)
  unit: cmH2O
  category: Respiratory
  ref_source: ARDSNet Protocol
  ranges:
    lower: 0
    upper: 24
  thresholds:
  - name: auto_peep_significant
    criterion: 총PEEP − 설정PEEP > 5
    source: Harrison's 21st Ch.294
    note: Auto-PEEP >5 → air trapping 시사 (COPD, 천식)
  medical_terms:
    high: Elevated total PEEP (auto-PEEP component → air trapping)
224684:
  name: Tidal Volume (set)
  name_kr: 일회 호흡량 (설정값)
  unit: mL
  category: Respiratory
  ref_source: ARDSNet Protocol (NEJM 2000); Amato et al. NEJM 2015
  ranges:
    lower: 300
    upper: 700
  thresholds:
  - name: lung_protective_target
    criterion: ≤6 mL/kg IBW
    source: ARDSNet Protocol (NEJM 2000)
    note: ARDS 폐보호 환기 목표
  - name: upper_limit_ards
    criterion: ≤8 mL/kg IBW
    source: ARDSNet Protocol (NEJM 2000)
    note: ARDS 최대 허용 Vt
  medical_terms:
    low: Low tidal volume (lung-protective ventilation)
    high: High tidal volume (VILI risk)
  disease_associations:
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main:
    - J80
    pattern: 목표 ≤6 mL/kg IBW; >8 mL/kg IBW 시 VILI 위험 증가
  - disease_key: acute_respiratory_failure
    disease_kr: 급성 호흡부전
    icd10_main: *id005
    pattern: ARDS 동반 시 ≤6 mL/kg IBW 폐보호 환기 적용
  - disease_key: aspiration_pneumonia
    disease_kr: 흡인성 폐렴
    icd10_main: *id001
    pattern: ARDS 진행 시 ≤6 mL/kg IBW; 초기에는 표준 Vt 가능
  - disease_key: viral_pneumonia
    disease_kr: 바이러스 폐렴
    icd10_main: *id007
    pattern: 'COVID-19 ARDS: 엄격한 ≤6 mL/kg IBW 적용'
  note: IBW(남) = 50 + 0.91×(cm−152.4), IBW(여) = 45.5 + 0.91×(cm−152.4)
  related_itemids:
  - 224685
  - 224686
224685:
  name: Tidal Volume (observed)
  name_kr: 일회 호흡량 (실측값)
  unit: mL
  category: Respiratory
  ref_source: ARDSNet Protocol
  ranges:
    lower: 300
    upper: 700
  medical_terms:
    low: Low delivered tidal volume
    high: High delivered tidal volume
  note: 실제 전달된 Vt. 설정값과 차이 크면 leak 또는 compliance 변화 의심
224686:
  name: Tidal Volume (spontaneous)
  name_kr: 자발 호흡 일회 호흡량
  unit: mL
  category: Respiratory
  ref_source: Harrison's 21st Ch.294
  ranges:
    lower: 300
    upper: 700
  medical_terms:
    low: Low spontaneous tidal volume (weaning failure risk)
    high: High spontaneous tidal volume
  note: RSBI(Rapid Shallow Breathing Index) = RR/Vt(L). RSBI <105 → weaning 성공 예측
224687:
  name: Minute Volume
  name_kr: 분당 환기량
  unit: L/min
  category: Respiratory
  ref_source: Harrison's 21st Ch.286
  ranges:
    lower: 5.0
    upper: 10.0
  thresholds:
  - name: hyperventilation
    criterion: '>12'
    source: Harrison's 21st Ch.286
    note: 과환기
  - name: hypoventilation
    criterion: <4
    source: Harrison's 21st Ch.286
    note: 저환기
  medical_terms:
    low: Hypoventilation
    high: Hyperventilation (increased minute ventilation)
  note: MV = RR × Vt. 높은 MV + 정상 PaCO2 → 사강 환기 증가 (PE, ARDS)
224695:
  name: Peak Inspiratory Pressure (PIP)
  name_kr: 최대 흡기압
  unit: cmH2O
  category: Respiratory
  ref_source: Harrison's 21st Ch.294; ARDSNet Protocol
  ranges:
    lower: 10
    upper: 30
  thresholds:
  - name: concern
    criterion: '>35'
    source: Harrison's 21st Ch.294
    note: 기도 압력 이상 상승
  - name: critical
    criterion: '>40'
    source: Harrison's 21st Ch.294
    note: 기압손상(barotrauma) 위험
  medical_terms:
    low: Normal/Low airway pressure
    high: Elevated PIP (airway resistance ↑ or compliance ↓)
  disease_associations:
  - disease_key: asthma_exacerbation
    disease_kr: 천식 급성 악화
    icd10_main:
    - J45
    - J46
    pattern: ↑ (기도 저항 증가; PIP↑ but Pplat 정상 → 저항성 문제)
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main:
    - J44.0
    - J44.1
    pattern: ↑ (기도 폐쇄 + auto-PEEP)
  - disease_key: pneumothorax
    disease_kr: 기흉
    icd10_main:
    - J93.0
    - J93.1
    - J93.9
    pattern: ↑↑ (급격한 상승 → 긴장성 기흉 의심)
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main:
    - J80
    pattern: ↑ (compliance 저하; PIP↑ + Pplat↑ → compliance 문제)
  - disease_key: aspiration_pneumonia
    disease_kr: 흡인성 폐렴
    icd10_main: *id001
    pattern: ↑ (흡인 물질에 의한 기도 폐쇄 + compliance 저하)
  - disease_key: bronchiectasis
    disease_kr: 기관지확장증
    icd10_main: *id004
    pattern: ↑ (기도 분비물 + 기도벽 비후에 의한 저항 증가)
  - disease_key: emphysema
    disease_kr: 폐기종
    icd10_main: *id011
    pattern: ↑ (air trapping; PIP↑ but Pplat 정상 → 기도 저항 문제)
  - disease_key: acute_bronchiolitis
    disease_kr: 급성 세기관지염
    icd10_main: *id017
    pattern: ↑ (세기관지 부종 + 점액 마개에 의한 기도 저항 증가)
  note: PIP↑ + Pplat 정상 = 기도 저항 ↑ (천식/COPD/분비물). PIP↑ + Pplat↑ = compliance ↓ (ARDS/폐부종) PIP↓는 임상적으로 정상 또는 양압환기 부족(insufficient
    ventilatory support)을 의미할 수 있음 [Harrison's 21st Ch.294]. PIP↑ + Pplat 정상 = 기도 저항 ↑ (천식/COPD/분비물). PIP↑ + Pplat↑ = compliance
    ↓ (ARDS/폐부종).
224696:
  name: Plateau Pressure
  name_kr: 고원압 (정적 폐압)
  unit: cmH2O
  category: Respiratory
  ref_source: ARDSNet Protocol (NEJM 2000); Amato et al. NEJM 2015
  ranges:
    lower: 10
    upper: 25
  thresholds:
  - name: ardsnet_upper_limit
    criterion: ≤30
    source: ARDSNet Protocol (NEJM 2000)
    note: ARDSNet 상한 목표. Pplat >30 → Vt 감량 필요
  - name: driving_pressure_target
    criterion: Pplat − PEEP < 15
    source: Amato et al. NEJM 2015
    note: Driving pressure <15 → 사망률 감소와 독립적 연관
  medical_terms:
    low: Normal compliance
    high: Elevated Pplat (reduced lung compliance)
  disease_associations:
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main:
    - J80
    pattern: ↑ (compliance 저하; Pplat >30 → Vt 감량)
  - disease_key: pulmonary_edema
    disease_kr: 폐부종 / 심부전
    icd10_main:
    - J81.0
    - J81.1
    - I50.1
    pattern: ↑ (폐부종으로 compliance 저하)
  - disease_key: interstitial_lung_disease
    disease_kr: 간질성 폐질환 / 폐섬유화증
    icd10_main:
    - J84.1
    - J84.9
    pattern: ↑ (섬유화에 의한 만성적 compliance 저하)
  - disease_key: aspiration_pneumonia
    disease_kr: 흡인성 폐렴
    icd10_main: *id001
    pattern: ↑ (화학적 폐렴 → compliance 저하; ARDS 진행 시 현저)
  - disease_key: viral_pneumonia
    disease_kr: 바이러스 폐렴
    icd10_main: *id007
    pattern: ↑ (광범위 GGO → compliance 저하; COVID ARDS에서 phenotype별 차이)
  - disease_key: sarcoidosis
    disease_kr: 사르코이드증
    icd10_main: *id003
    pattern: ↑ (Stage IV 섬유화 시 compliance 저하)
  - disease_key: pneumoconiosis
    disease_kr: 진폐증
    icd10_main: *id013
    pattern: ↑ (진행성 섬유화 시 compliance 저하)
  derived_indicators:
  - name: Driving Pressure
    description: ARDS 사망률의 독립적 예측 인자
    source: Amato et al. NEJM 2015
    formula: Pplat − PEEP
    thresholds:
      target: <15
      concern: ≥15
224697:
  name: Mean Airway Pressure
  name_kr: 평균 기도압
  unit: cmH2O
  category: Respiratory
  ref_source: Harrison's 21st Ch.294
  ranges:
    lower: 5
    upper: 20
  medical_terms:
    low: Low mean airway pressure
    high: Elevated mean airway pressure
  note: 산소화와 양의 상관. 높을수록 산소화 개선 가능하나 혈역학적 부작용 증가
223834:
  name: O2 Flow
  name_kr: 산소 유량
  unit: L/min
  category: Respiratory
  ref_source: BTS Oxygen Guideline 2017
  ranges:
    lower: 0
    upper: 15
  thresholds:
  - name: nasal_cannula_max
    criterion: ≤6
    source: BTS Oxygen Guideline 2017
    note: 비강 캐뉼라 최대 유량
  - name: simple_mask_range
    criterion: 5–10
    source: BTS Oxygen Guideline 2017
    note: 단순 산소 마스크 유량 범위
  - name: reservoir_mask_range
    criterion: 10–15
    source: BTS Oxygen Guideline 2017
    note: 비재호흡 마스크(reservoir) 유량 범위
  - name: hfnc_max
    criterion: ≤60
    source: Frat et al. NEJM 2015 (FLORALI)
    note: 고유량 비강 캐뉼라(HFNC) 최대 유량
  medical_terms:
    high: High O2 flow requirement (significant hypoxemia)
  related_itemids:
  - 227287
  - 227582
224738:
  name: Inspiratory Time
  name_kr: 흡기 시간
  unit: sec
  category: Respiratory
  ref_source: ARDSNet Protocol
  ranges:
    lower: 0.6
    upper: 1.2
  medical_terms:
    low: Short inspiratory time
    high: Prolonged inspiratory time (IRV strategy)
  note: I:E ratio 결정. ARDS에서 inverse ratio ventilation (I:E >1:1) 고려 가능
220283:
  name: Resistance (Airway)
  name_kr: 기도 저항
  unit: cmH2O/L/sec
  category: Respiratory
  ref_source: Harrison's 21st Ch.286
  ranges:
    lower: 5
    upper: 15
  thresholds:
  - name: elevated
    criterion: '>20'
    source: Harrison's 21st Ch.286
    note: 기도 저항 상승 (기관지 수축, 분비물, ETT 폐색)
  medical_terms:
    low: Normal airway resistance
    high: Elevated airway resistance (bronchospasm, secretions, ETT obstruction)
  disease_associations:
  - disease_key: asthma_exacerbation
    disease_kr: 천식 급성 악화
    icd10_main:
    - J45
    - J46
    pattern: ↑↑ (기관지 수축; 치료 반응 모니터링 지표)
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main:
    - J44.0
    - J44.1
    pattern: ↑ (기도 폐쇄 + 분비물)
  - disease_key: aspiration_pneumonia
    disease_kr: 흡인성 폐렴
    icd10_main: *id001
    pattern: ↑ (흡인 물질 + 반사적 기관지 수축)
  - disease_key: bronchiectasis
    disease_kr: 기관지확장증
    icd10_main: *id004
    pattern: ↑ (기도벽 비후 + 분비물 축적)
  - disease_key: emphysema
    disease_kr: 폐기종
    icd10_main: *id011
    pattern: ↑ (호기 시 동적 기도 허탈; expiratory flow limitation)
  - disease_key: acute_bronchitis
    disease_kr: 급성 기관지염
    icd10_main: *id016
    pattern: 경미 ↑ (기도 염증 + 분비물; 기관지 수축은 경미)
  - disease_key: acute_bronchiolitis
    disease_kr: 급성 세기관지염
    icd10_main: *id017
    pattern: ↑ (세기관지 부종 + 점액; 영유아에서 현저)
  - disease_key: pulmonary_eosinophilia
    disease_kr: 폐 호산구증가증
    icd10_main: *id014
    pattern: ↑ (호산구성 기도 염증에 의한 기관지 수축)
229661:
  name: Compliance (Respiratory System)
  name_kr: 폐 순응도 (정적)
  unit: mL/cmH2O
  category: Respiratory
  ref_source: Harrison's 21st Ch.286; ARDSNet Protocol
  ranges:
    lower: 60
    upper: 100
  thresholds:
  - name: ards_typical
    criterion: <40
    source: Harrison's 21st Ch.294
    note: ARDS에서 전형적인 compliance 범위 20–40
  - name: severe_ards
    criterion: <20
    source: Harrison's 21st Ch.294
    note: 중증 ARDS (baby lung)
  medical_terms:
    low: Reduced compliance (stiff lung)
    high: Normal/Increased compliance
  disease_associations:
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main:
    - J80
    pattern: ↓↓ (20–40 mL/cmH2O; baby lung concept)
  - disease_key: pulmonary_edema
    disease_kr: 폐부종 / 심부전
    icd10_main:
    - J81.0
    - J81.1
    - I50.1
    pattern: ↓ (이뇨 후 개선)
  - disease_key: interstitial_lung_disease
    disease_kr: 간질성 폐질환 / 폐섬유화증
    icd10_main:
    - J84.1
    - J84.9
    pattern: ↓ (만성적 compliance 저하)
  - disease_key: pneumothorax
    disease_kr: 기흉
    icd10_main:
    - J93.0
    - J93.1
    - J93.9
    pattern: ↓ (급격한 감소 → 긴장성 기흉 의심)
  - disease_key: aspiration_pneumonia
    disease_kr: 흡인성 폐렴
    icd10_main: *id001
    pattern: ↓ (화학적 폐렴 + ARDS 시 현저한 compliance 저하)
  - disease_key: viral_pneumonia
    disease_kr: 바이러스 폐렴
    icd10_main: *id007
    pattern: '↓ (COVID-19 ARDS: L-type은 비교적 보존, H-type은 현저 ↓)'
  - disease_key: emphysema
    disease_kr: 폐기종
    icd10_main: *id011
    pattern: ↑ (폐 탄성 소실로 compliance 오히려 증가; 과팽창)
  - disease_key: sarcoidosis
    disease_kr: 사르코이드증
    icd10_main: *id003
    pattern: ↓ (Stage IV 섬유화 시)
  - disease_key: pneumoconiosis
    disease_kr: 진폐증
    icd10_main: *id013
    pattern: ↓ (진행성 massive fibrosis 시 점진적 저하)
  - disease_key: hypersensitivity_pneumonitis
    disease_kr: 과민성 폐렴
    icd10_main: *id012
    pattern: ↓ (만성 섬유화형에서; 급성형은 일시적)
