    흡인 빈도는 RLL보다 낮음 [Harrison's 21st Ch.257; Murray & Nadel 7th]. 좌측 하부 청진 시 심장 인접에 의한 cardiac artifact 주의 — 심첨부 인접으로 심음이
    폐음과 중첩될 수 있음 [Bates' 13th].
