    Clear: 정상 vesicular 호흡음
    Diminished: 폐음 감소 — 좌측 흉수(하부 저류), 좌측 기흉, 좌하엽 무기폐, 비만, COPD 과팽창 [Bates' 13th]
    Absent: 폐음 소실 — 대량 좌측 기흉, 대량 좌측 흉수, 완전 좌하엽 무기폐 [Harrison's 21st]
