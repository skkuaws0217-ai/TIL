    - J14
    - J15
    - J18
    pattern: ↓ (<90 → 패혈성 쇼크; 중증 폐렴 major criteria)
  - disease_key: pulmonary_embolism
    disease_kr: 폐색전증
    icd10_main:
    - I26.0
    - I26.09
    - I26.90
    - I26.99
    pattern: ↓ (<90 → 대량 PE, hemodynamic instability)
  - disease_key: pneumothorax
    disease_kr: 기흉
    icd10_main:
    - J93.0
    - J93.1
    - J93.9
    pattern: ↓ (긴장성 기흉 → obstructive shock)
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main:
    - J80
    pattern: ↓ (패혈증 동반 시; 양압환기에 의한 전부하 감소)
  - disease_key: aspiration_pneumonia
    disease_kr: 흡인성 폐렴
    icd10_main: *id001
    pattern: ↓ (대량 흡인 + 패혈증 시 저혈압; <90 → 쇼크)
  - disease_key: acute_respiratory_failure
    disease_kr: 급성 호흡부전
    icd10_main: *id005
    pattern: 가변적 (초기 교감 항진 → ↑; 진행 시 → ↓ 쇼크)
  - disease_key: empyema
    disease_kr: 농흉
    icd10_main: *id009
    pattern: ↓ (패혈성 쇼크 동반 시; <90 → 중증)
  - disease_key: sleep_apnea
    disease_kr: 수면무호흡
    icd10_main: *id015
    pattern: ↑ (동반 고혈압 흔함; OSA 환자 50% 이상에서 HTN)
  - disease_key: influenza_pneumonia
    disease_kr: 인플루엔자
    icd10_main: *id008
    pattern: ↓ (중증/패혈증 동반 시)
