223988:
  name: LUL Lung Sounds
  name_kr: 좌상엽 폐음
  unit: text
  category: Pulmonary
  ref_source: Bohadana et al. NEJM 2014;370:744-751; Bates' 13th Ed (Bickley 2021); Harrison's 21st Ch.284
  type: categorical
  values:
  - Clear
  - Diminished
  - Absent
  - Crackles
  - Rhonchi
  - Wheezes
  - Bronchial
  clinical_significance:
    Clear: 정상 vesicular 호흡음
    Diminished: 폐음 감소 — 좌측 기흉, 좌측 상부 흉수(드묾), 좌상엽 무기폐, 비만, COPD 과팽창 [Bates' 13th]
    Absent: 폐음 소실 — 대량 좌측 기흉, 좌상엽 완전 무기폐 [Harrison's 21st]
    Crackles: '수포음 — (1) Fine: 사르코이드증(Stage IV), 진폐증(상엽 섬유화) [Murray & Nadel 7th]; (2) Coarse: 폐결핵(상엽 첨후분절 공동/침윤), 세균성 폐렴
      [Harrison''s 21st]'
    Rhonchi: 저음 연속음 — 기도 분비물(COPD, 기관지확장증); 좌상엽 기관지 종양 시 국소적 [NEJM 2014]
    Wheezes: 고음 연속음 — 천식, COPD; LUL 국소 wheezes 시 좌상엽 기관지 내 종양/이물 감별 [Forgacs, Chest 1978]
    Bronchial: 기관지성 호흡음 — consolidation(폐렴, 폐결핵 공동 주변), ���상엽 무기폐 인접 부위 [NEJM 2014]
  note: LUL에는 해부학적으로 Lingula(좌설엽)가 포함되며 이는 우중엽(RML)에 대응하는 구조. Lingula 병변은 좌상엽 청진 영역에서 포착됨 [Bates' 13th]. 좌상엽은 우상엽(RUL)과 함께
    폐결핵, 진폐증, 사르코이드증의 상엽 우세 병변 평가에 핵심. 단, 좌측 심장 인접으로 심음 간섭이 있을 수 있으며 전흉부 청진 시 주의 필요 [Bates' 13th].
  disease_associations:
  - disease_key: tuberculosis
    disease_kr: 폐결핵
    icd10_main: *id036
    pattern: Crackles, Bronchial (상엽 첨후분절 호발; RUL 다음으로 LUL이 결핵 호발 부위; 공동 형성 시 amphoric breathing) [Harrison's 21st Ch.173]
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main: *id018
    pattern: Crackles, Bronchial (좌상엽 ��엽성 폐렴 시; lingula 포함) [ATS/IDSA 2019]
  - disease_key: hospital_acquired_pneumonia
    disease_kr: 병원획득 폐렴 (HAP/VAP)
    icd10_main: *id037
    pattern: Crackles, Bronchial (HAP에서 상엽 침범 가능) [ATS/IDSA 2016]
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main: *id020
    pattern: Wheezes, Rhonchi, Diminished (양측 미만성; 상엽 과팽창 현저) [GOLD 2024]
  - disease_key: asthma_exacerbation
    disease_kr: 천식 급성 악화
    icd10_main: *id021
    pattern: Wheezes (양측 미만성 호기 wheezes; silent chest = 생명위협) [GINA 2024]
  - disease_key: lung_cancer
    disease_kr: 폐암
    icd10_main: *id027
    pattern: Diminished (좌상엽 종양에 의한 무기폐), 국소 Wheezes (기관지 내 종양; 좌상엽 기관지암은 Pancoast 종양 가능) [Harrison's 21st Ch.74]
  - disease_key: sarcoidosis
    disease_kr: 사르코이드증
    icd10_main: *id035
    pattern: Clear (Stage I-II) → Crackles (Stage III-IV에서 상엽 섬유화 우세; 양측 폐문 림프절 비대 동반) [ATS/ERS/WASOG 2020; Harrison's 21st
      Ch.360]
  - disease_key: pneumoconiosis
    disease_kr: 진폐증
    icd10_main: *id033
    pattern: 'Crackles (규폐증: 상엽 우세 진행성 거대 섬유화(PMF); 탄광부 진폐증도 상엽 우세) [Harrison''s 21st Ch.287; Murray & Nadel 7th]'
  - disease_key: pneumothorax
    disease_kr: 기흉
    icd10_main: *id024
    pattern: Diminished/Absent (좌측 기흉 시; 자발성 기흉은 상엽 첨부 bleb 파열로 상엽에서 시작) [Harrison's 21st]
  - disease_key: pulmonary_edema
    disease_kr: 폐부종 / 심부전
    icd10_main: *id022
    pattern: Crackles (진행 시 양측 상엽까지 확산; 초기에는 하엽에 국한) [Harrison's 21st]
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main: *id038
    pattern: Crackles (양측 미만성; 진행 시 상엽 포함 전 폐야 침범) [Berlin Definition]
  - disease_key: pleural_effusion
    disease_kr: 흉수
    icd10_main: *id023
    pattern: Diminished (좌측 흉수 — 대량일 때 상부까지 확장; 소량이면 LLL에 국한) [Bates' 13th]
  - disease_key: interstitial_lung_disease
    disease_kr: 간질성 폐질환 / 폐섬유화증
    icd10_main: *id025
    pattern: 'Crackles (NSIP: 상엽 포함 미만성; IPF는 기저부 우세이나 진행 시 상엽까지) [ATS/ERS IPF 2022]'
  - disease_key: bronchiectasis
    disease_kr: 기관지확장증
    icd10_main: *id026
    pattern: Coarse Crackles (상엽 기관지확장증 — 결핵 후유증, ABPA에서 중심성 상엽 침범) [ERS Bronchiectasis 2017]
  - disease_key: emphysema
    disease_kr: 폐기종
    icd10_main: *id031
    pattern: Diminished (상엽 우세 소엽중심성 폐기종 — 흡연 관련; 전반적 폐음 감소) [GOLD 2024; Murray & Nadel 7th]
  - disease_key: hypersensitivity_pneumonitis
    disease_kr: 과민성 폐렴
    icd10_main: *id032
    pattern: Crackles (만성형 — 상엽 포함 미만성 섬유화; 급성형은 양측 중하엽) [ATS/JRS/ALAT HP 2020]
  - disease_key: viral_pneumonia
