    icd10_main: *id019
    pattern: Crackles (RLL 다음으로 LLL이 흡인 호발; 좌측와위 시 LLL 우선 침범) [Harrison's 21st Ch.257; Murray & Nadel 7th]
  - disease_key: copd_exacerbation
