# ═══════════════════════════════════════════════════════════════
# Vitals · Respiratory · Hemodynamic Reference_Range v1
# MIMIC-IV chartevents ItemID 기반 — 폐 질환 진단 보조 도구
#
# 기준 원칙:
#   - ranges (lower/upper): 값 < lower → hypo, 값 > upper → hyper
#   - thresholds: 각 가이드라인 원문의 연산자(≤, <, ≥, >) 그대로 표기
#
# 연동 질환: 30개 (일반 17 + 기타 9 + 희귀 연관 4)
#   profiles 17: CAP, HAP, 흡인성폐렴, COPD, 천식, PE, 폐부종,
#     ARDS, 폐암, 폐결핵, 흉수, 기흉, ILD, 사르코이드증,
#     기관지확장증, 폐동맥고혈압, 폐농양
#   추가 13: 급성/만성 호흡부전, 바이러스폐렴, 인플루엔자,
#     농흉, 무기폐, 폐기종, 수면무호흡, 과민성폐렴, 진폐증,
#     폐호산구증가증, 급성기관지염, 급성세기관지염
#
# Sources: Harrison's 21st, GOLD 2024, GINA 2024, ATS/IDSA 2019,
#   Berlin Definition 2012, ESC PE 2022, NEWS2 (RCP 2017),
#   qSOFA (Seymour JAMA 2016), CURB-65, PESI (Aujesky 2005),
#   ARDSNet (NEJM 2000), Surviving Sepsis 2021, BTS O2 2017,
#   Wells PE (Ann Intern Med 2001), Amato NEJM 2015
# ═══════════════════════════════════════════════════════════════

# ─── A. Core Vital Signs (기본 활력징후) ───────────────────────

220277:
  name: SpO2 (Pulse Oximetry)
  name_kr: 산소포화도 (맥박산소측정)
  unit: '%'
  category: Routine Vital Signs
  ref_source: GOLD 2024; GINA 2024; BTS Oxygen Guideline 2017
  ranges:
    lower: 95
    upper: 100
  thresholds:
  - name: borderline_hypoxemia
    criterion: ≤94
    source: BTS Oxygen Guideline 2017
    note: 산소 보충 고려 시작
  - name: abg_recommended_copd
    criterion: ≤92
    source: GOLD 2024
    note: ABG 시행 권고
  - name: life_threatening_asthma
    criterion: <90
    source: GINA 2024
    note: 생명위협 천식
  - name: severe_asthma_exacerbation
    criterion: <92
    source: GINA 2024
    note: 중증 천식 악화
  - name: ltot_indication_copd
    criterion: ≤88
    source: GOLD 2024; ATS/ERS
    note: 장기 산소요법(LTOT) 적응증
  - name: severe_hypoxemia
    criterion: <85
    source: Harrison's 21st
    note: 즉각적 개입 필요
  - name: target_general
    criterion: 94–98
    source: BTS Oxygen Guideline 2017
    note: 일반 환자 목표 범위
  - name: target_copd_co2_risk
    criterion: 88–92
    source: BTS Oxygen Guideline 2017
    note: CO2 축적 위험 환자 목표 범위
  medical_terms:
    low: Hypoxemia (desaturation)
    critical_low: Severe Hypoxemia (immediate intervention required)
  scoring_systems:
    NEWS2:
      ≤91: 3
      92–93: 2
      94–95: 1
      ≥96: 0
    NEWS2_Scale2_COPD:
      ≤83: 3
      84–85: 2
      86–87: 1
      88–92: 0
      93–94: 1
      95–96: 2
      ≥97: 3
  disease_associations:
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main:
    - J13
    - J14
    - J15
    - J18
    pattern: '↓ (≤94%: 중증 지표)'
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main:
    - J44.0
    - J44.1
    pattern: ↓ (≤88% → LTOT 적응; ≤92% → ABG 필요)
  - disease_key: asthma_exacerbation
    disease_kr: 천식 급성 악화
    icd10_main:
    - J45
    - J46
    pattern: ↓ (<92% → 중증; <90% → 생명위협)
  - disease_key: pulmonary_embolism
    disease_kr: 폐색전증
    icd10_main:
    - I26.0
    - I26.09
    - I26.90
    - I26.99
    pattern: ↓ (급성 V/Q mismatch)
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main:
    - J80
    pattern: ↓↓ (SpO2/FiO2 비율로 중증도 대체 평가)
  - disease_key: pneumothorax
    disease_kr: 기흉
    icd10_main:
    - J93.0
    - J93.1
    - J93.9
    pattern: ↓ (긴장성 기흉 시 급격 하강)
  - disease_key: interstitial_lung_disease
    disease_kr: 간질성 폐질환 / 폐섬유화증
    icd10_main:
    - J84.1
    - J84.9
    pattern: ↓ (운동 시 desaturation이 초기 징후)
  - disease_key: aspiration_pneumonia
    disease_kr: 흡인성 폐렴
    icd10_main: &id001
    - J69.0
    pattern: ↓ (흡인 범위에 따라 다양; 대량 흡인 시 급격 저하)
  - disease_key: lung_cancer
    disease_kr: 폐암
    icd10_main: &id002
    - C34.0
    - C34.1
    - C34.2
    - C34.3
    - C34.8
    - C34.9
    pattern: ↓ (기도 폐쇄, 흉수, 림프관성 전이 시; 초기에는 정상)
  - disease_key: sarcoidosis
    disease_kr: 사르코이드증
    icd10_main: &id003
    - D86.0
    - D86.1
    - D86.2
    - D86.9
    pattern: ↓ (Stage III-IV 진행 시; 운동 시 desaturation)
  - disease_key: bronchiectasis
    disease_kr: 기관지확장증
    icd10_main: &id004
    - J47.0
    - J47.1
    - J47.9
    pattern: ↓ (감염 악화 시 저하; 만성 colonization 환자에서 기저치 낮음)
  - disease_key: acute_respiratory_failure
    disease_kr: 급성 호흡부전
    icd10_main: &id005
    - J96.0
    - J96.9
    pattern: '↓↓ (Type 1: PaO2 <60mmHg; SpO2 급격 저하가 주 소견)'
  - disease_key: chronic_respiratory_failure
    disease_kr: 만성 호흡부전
    icd10_main: &id006
    - J96.1
    pattern: ↓ (만성적 저하; LTOT 적용 환자에서 ≤88%)
  - disease_key: viral_pneumonia
    disease_kr: 바이러스 폐렴
    icd10_main: &id007
    - J12
    - J12.8
    - J12.9
    pattern: ↓ (양측 GGO 시 현저; COVID-19에서 silent hypoxia 보고)
  - disease_key: influenza_pneumonia
    disease_kr: 인플루엔자
    icd10_main: &id008
    - J10
    - J10.0
    - J10.1
    pattern: ↓ (2차 세균 감염 동반 시 급격 악화)
  - disease_key: empyema
    disease_kr: 농흉
    icd10_main: &id009
    - J86
    - J86.0
    - J86.9
    pattern: ↓ (흉수에 의한 폐 압박; 패혈증 동반 시 저하)
  - disease_key: atelectasis
    disease_kr: 무기폐 (폐허탈)
    icd10_main: &id010
    - J98.1
    pattern: ↓ (폐엽 이상 범위 시 유의; 수술 후 흔한 원인)
  - disease_key: emphysema
    disease_kr: 폐기종
    icd10_main: &id011
    - J43
    - J43.0
    - J43.1
    - J43.9
    pattern: ↓ (만성적 가스교환 장애; COPD와 유사)
  - disease_key: sleep_apnea
    disease_kr: 수면무호흡
    icd10_main: &id015
    - G47.3
    - G47.30
    - G47.33
    pattern: ↓ (간헐적 야간 desaturation; ODI ≥5 진단 기준 보조)
  - disease_key: hypersensitivity_pneumonitis
    disease_kr: 과민성 폐렴
    icd10_main: &id012
    - J67
    - J67.9
    pattern: ↓ (급성 노출 후 일시적 저하; 만성형에서 지속적)
  - disease_key: pneumoconiosis
    disease_kr: 진폐증
    icd10_main: &id013
    - J62
    - J62.8
    pattern: ↓ (진행성 massive fibrosis 시 점진적 저하)
  - disease_key: pulmonary_eosinophilia
    disease_kr: 폐 호산구증가증
    icd10_main: &id014
    - J82
    pattern: ↓ (광범위 침윤 시; 경증은 정상 유지)
  derived_indicators:
  - name: SpO2/FiO2 ratio (S/F ratio)
    description: ARDS 중증도 비침습적 대체 지표
    source: Rice et al. Crit Care Med 2007
    formula: SpO2 / FiO2
    thresholds:
      mild: ≤315
      moderate: ≤235
      severe: ≤148
220210:
  name: Respiratory Rate
  name_kr: 호흡수
  unit: insp/min
  category: Respiratory
  ref_source: Harrison's 21st Ch.33; qSOFA (Seymour JAMA 2016); NEWS2 (RCP 2017)
  ranges:
    lower: 12
    upper: 20
  thresholds:
  - name: qsofa_criterion
    criterion: ≥22
    source: Seymour et al. JAMA 2016 (qSOFA)
    note: '패혈증 선별: qSOFA 1점'
  - name: severe_pneumonia_curb65
    criterion: ≥30
    source: ATS/IDSA CAP Guidelines 2019; CURB-65
    note: 중증 폐렴 minor criteria; CURB-65 1점
  - name: severe_asthma
    criterion: '>25'
    source: GINA 2024
    note: 중증 천식 악화
  - name: respiratory_depression
    criterion: <8
    source: NEWS2 (RCP 2017)
    note: 호흡 억제 — 즉각 개입 필요
  medical_terms:
    low: Bradypnea (respiratory depression)
    high: Tachypnea
    critical_low: Severe Bradypnea (ventilatory failure risk)
    critical_high: Severe Tachypnea (respiratory distress)
  scoring_systems:
    NEWS2:
      ≤8: 3
      9–11: 1
      12–20: 0
      21–24: 2
      ≥25: 3
    CURB65:
      ≥30: 1
    qSOFA:
      ≥22: 1
  disease_associations:
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main:
    - J13
    - J14
    - J15
    - J18
    pattern: ↑ (≥30 → 중증; 가장 민감한 활력징후 변화)
  - disease_key: pulmonary_embolism
    disease_kr: 폐색전증
    icd10_main:
    - I26.0
    - I26.09
    - I26.90
    - I26.99
    pattern: ↑ (빈호흡은 PE의 가장 흔한 징후)
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main:
    - J80
    pattern: ↑↑ (현저한 빈호흡, 호흡 보조근 사용)
  - disease_key: asthma_exacerbation
    disease_kr: 천식 급성 악화
    icd10_main:
    - J45
    - J46
    pattern: ↑ (>25 → 중증; 호기 연장)
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main:
    - J44.0
    - J44.1
    pattern: ↑ (보조근 사용, pursed-lip breathing)
  - disease_key: pneumothorax
    disease_kr: 기흉
    icd10_main:
    - J93.0
    - J93.1
    - J93.9
    pattern: ↑ (긴장성 기흉 시 급격 상승)
  - disease_key: aspiration_pneumonia
    disease_kr: 흡인성 폐렴
    icd10_main: *id001
    pattern: ↑ (흡인 직후 급격 상승; 화학적 폐렴 반응)
  - disease_key: lung_cancer
    disease_kr: 폐암
    icd10_main: *id002
    pattern: ↑ (기도 폐쇄/흉수 시; 만성적으로 점진적 증가)
  - disease_key: sarcoidosis
    disease_kr: 사르코이드증
    icd10_main: *id003
    pattern: ↑ (폐 침범 정도에 비례; 경미한 경우 정상)
  - disease_key: bronchiectasis
    disease_kr: 기관지확장증
    icd10_main: *id004
    pattern: ↑ (감염 악화 시; 객담 배출 증가에 따른 반사적 빈호흡)
  - disease_key: acute_respiratory_failure
    disease_kr: 급성 호흡부전
    icd10_main: *id005
    pattern: '↑↑ (Type 1: 보상성 빈호흡 ≥30; Type 2: 호흡 억제 시 ↓ 가능)'
  - disease_key: chronic_respiratory_failure
    disease_kr: 만성 호흡부전
    icd10_main: *id006
    pattern: ↑ (만성 보상; 기저 RR 높을 수 있음)
  - disease_key: viral_pneumonia
    disease_kr: 바이러스 폐렴
    icd10_main: *id007
    pattern: ↑ (≥30 → 중증; COVID-19에서 ≥22는 qSOFA 기준 충족)
  - disease_key: influenza_pneumonia
    disease_kr: 인플루엔자
    icd10_main: *id008
    pattern: ↑ (고열 동반 시 더욱 증가)
  - disease_key: empyema
    disease_kr: 농흉
    icd10_main: *id009
    pattern: ↑ (흉수 + 감염에 의한 제한적 환기)
  - disease_key: atelectasis
    disease_kr: 무기폐 (폐허탈)
    icd10_main: *id010
    pattern: ↑ (보상성 빈호흡; 대엽성 무기폐 시 현저)
  - disease_key: emphysema
    disease_kr: 폐기종
    icd10_main: *id011
    pattern: ↑ (호기 연장; pursed-lip breathing)
  - disease_key: hypersensitivity_pneumonitis
    disease_kr: 과민성 폐렴
    icd10_main: *id012
    pattern: ↑ (급성 노출 4-8시간 후 빈호흡 발생)
  - disease_key: pneumoconiosis
    disease_kr: 진폐증
    icd10_main: *id013
    pattern: ↑ (운동 시 특히 증가; 안정 시에는 경미)
  - disease_key: pulmonary_eosinophilia
    disease_kr: 폐 호산구증가증
    icd10_main: *id014
    pattern: ↑ (기관지 수축 동반 시)
  - disease_key: acute_bronchitis
    disease_kr: 급성 기관지염
    icd10_main: &id016
    - J20
    - J20.8
    - J20.9
    pattern: 정상~경미 ↑ (기침 발작 시 일시적 상승; 중증 아니면 정상)
  - disease_key: acute_bronchiolitis
    disease_kr: 급성 세기관지염
    icd10_main: &id017
    - J21
    - J21.8
    - J21.9
    pattern: ↑ (영유아에서 ≥60 → 중증; 호기 연장, 흉벽 함몰)
  related_itemids:
  - 224688
  - 224689
  - 224690
224688:
  name: Respiratory Rate (Set)
  name_kr: 호흡수 (인공호흡기 설정)
  unit: insp/min
  category: Respiratory
  ref_source: ARDSNet Protocol (NEJM 2000)
  ranges:
    lower: 12
    upper: 35
  medical_terms:
    low: Low ventilator rate setting
    high: High ventilator rate setting
  note: '인공호흡기 설정 호흡수. ARDSNet: 6mL/kg Vt에 맞춰 pH 7.30 유지하도록 RR 조정 (최대 35)'
224689:
  name: Respiratory Rate (spontaneous)
  name_kr: 자발 호흡수
  unit: insp/min
  category: Respiratory
  ref_source: Harrison's 21st Ch.294
  ranges:
    lower: 10
    upper: 25
  medical_terms:
    low: Low spontaneous respiratory effort
    high: Increased respiratory drive
  note: 인공호흡기 보조 중 자발 호흡. 높을수록 호흡 부하/불편감 시사
224690:
  name: Respiratory Rate (Total)
  name_kr: 총 호흡수
  unit: insp/min
  category: Respiratory
  ref_source: ARDSNet Protocol
  ranges:
    lower: 12
    upper: 35
  thresholds:
  - name: dyssynchrony_concern
    criterion: '>35'
    source: ARDSNet Protocol (NEJM 2000)
    note: 환자-인공호흡기 비동기 의심
  medical_terms:
    low: Low total rate
    high: High total rate (dyssynchrony possible)
220045:
  name: Heart Rate
  name_kr: 심박수
  unit: bpm
  category: Routine Vital Signs
  ref_source: Harrison's 21st Ch.238; PESI (Aujesky 2005); NEWS2 (RCP 2017)
  ranges:
    lower: 60
    upper: 100
  thresholds:
  - name: tachycardia
    criterion: ≥100
    source: Harrison's 21st Ed
    note: 빈맥 정의
  - name: wells_pe_criterion
    criterion: '>100'
    source: Wells et al. Ann Intern Med 2001
    note: Wells PE Score +1.5점
  - name: pesi_risk_factor
    criterion: ≥110
    source: Aujesky et al. Am J Med 2005 (PESI)
    note: PESI +20점
  - name: severe_tachycardia
    criterion: ≥130
    source: Harrison's 21st Ed
    note: 혈역학적 불안정 우려
  - name: life_threatening_asthma_bradycardia
    criterion: <60
    source: GINA 2024
    note: 천식에서 서맥 = 불량 예후 징후
  - name: severe_bradycardia
    criterion: ≤40
    source: NEWS2 (RCP 2017)
    note: NEWS2 3점
  medical_terms:
    low: Bradycardia
    high: Tachycardia
    critical_low: Severe Bradycardia
    critical_high: Severe Tachycardia (hemodynamic compromise)
  scoring_systems:
    NEWS2:
      ≤40: 3
      41–50: 1
      51–90: 0
      91–110: 1
      111–130: 2
      ≥131: 3
    PESI:
      ≥110: +20점
    Wells_PE:
      '>100': +1.5점
  disease_associations:
  - disease_key: pulmonary_embolism
    disease_kr: 폐색전증
    icd10_main:
    - I26.0
    - I26.09
    - I26.90
    - I26.99
    pattern: ↑ (PE의 가장 흔한 활력징후 이상; Wells Score 구성)
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main:
    - J13
    - J14
    - J15
    - J18
    pattern: ↑ (발열, 저산소에 의한 보상성 빈맥)
  - disease_key: pneumothorax
    disease_kr: 기흉
    icd10_main:
    - J93.0
    - J93.1
    - J93.9
    pattern: '↑ (긴장성 기흉: 빈맥 + 저혈압)'
  - disease_key: asthma_exacerbation
    disease_kr: 천식 급성 악화
    icd10_main:
    - J45
    - J46
    pattern: ↑ (≥120 → 중증; paradoxical bradycardia는 불량 징후)
  - disease_key: pulmonary_hypertension
    disease_kr: 폐동맥 고혈압
    icd10_main:
    - I27.0
    - I27.20
    - I27.21
    - I27.29
    pattern: ↑ (우심 부전 보상; 부정맥 동반 가능)
  - disease_key: pulmonary_edema
    disease_kr: 폐부종 / 심부전
    icd10_main:
    - J81.0
    - J81.1
    - I50.1
    pattern: ↑ (심부전 보상)
  - disease_key: aspiration_pneumonia
    disease_kr: 흡인성 폐렴
    icd10_main: *id001
    pattern: ↑ (발열, 저산소에 의한 보상; 패혈증 동반 시 ≥100)
  - disease_key: lung_cancer
    disease_kr: 폐암
    icd10_main: *id002
    pattern: ↑ (SVC 증후군, 흉수, 빈혈에 의한 보상성 빈맥)
  - disease_key: sarcoidosis
    disease_kr: 사르코이드증
    icd10_main: *id003
    pattern: ↑ (드물게 심장 사르코이드증 시 부정맥/전도 장애)
  - disease_key: bronchiectasis
    disease_kr: 기관지확장증
    icd10_main: *id004
    pattern: ↑ (감염 악화 시; 만성 환자에서 기저치 상승 가능)
  - disease_key: acute_respiratory_failure
    disease_kr: 급성 호흡부전
    icd10_main: *id005
    pattern: ↑ (저산소 보상; ≥120 → 중증)
  - disease_key: viral_pneumonia
    disease_kr: 바이러스 폐렴
    icd10_main: *id007
    pattern: ↑ (발열에 비례; COVID-19에서 상대적 서맥 보고됨)
  - disease_key: influenza_pneumonia
    disease_kr: 인플루엔자
    icd10_main: *id008
    pattern: ↑ (고열에 의한 빈맥; 심근염 합병 시 부정맥)
  - disease_key: empyema
    disease_kr: 농흉
    icd10_main: *id009
    pattern: ↑ (패혈증/발열에 의한 지속적 빈맥)
  - disease_key: sleep_apnea
    disease_kr: 수면무호흡
    icd10_main: *id015
    pattern: 가변적 (무호흡 중 서맥 → 각성 시 빈맥; 야간 부정맥)
  - disease_key: pulmonary_eosinophilia
    disease_kr: 폐 호산구증가증
    icd10_main: *id014
    pattern: 경미 ↑ (중증 기관지 수축 시)
220050:
  name: Arterial Blood Pressure systolic
